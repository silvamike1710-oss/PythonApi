services:
  api:
    build: .
    container_name: checklist-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app
    redis:
      image: redis:latest
      ports:
        - "6379:6379"
  
    environment:
      DATABASE_URL: sqlite:///./tasks.db
      USUARIO: "admin"
      SENHA: "admin1234"

    restart: unless-stopped

    command: uvicorn main:app --host 0.0.0.0 --port 8000